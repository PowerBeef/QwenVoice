name: QwenVoice
options:
  bundleIdPrefix: com.qwenvoice
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  QwenVoice:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "Resources/python/**"
          - "Resources/ffmpeg"
          - "Resources/ffmpeg/**"
          - "Resources/vendor"
          - "Resources/vendor/**"
          - "Resources/backend"
          - "Resources/backend/**"
          - "Resources/**/*.whl"
          - "Resources/**/__pycache__/**"
          - "Resources/**/*.pyc"
      - path: Sources/Resources/backend
        buildPhase:
          copyFiles:
            destination: resources
            subpath: backend
        excludes:
          - "server_compat.py"
          - "__pycache__/**"
          - "*.pyc"
    resources:
      - path: Sources/Resources
        buildPhase: resources
        excludes:
          - "python/**"
          - "ffmpeg"
          - "vendor"
          - "vendor/**"
          - "backend"
          - "backend/**"
          - "**/*.whl"
          - "**/__pycache__/**"
          - "**/*.pyc"
      - path: Sources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.app
        PRODUCT_NAME: QwenVoice
        WRAPPER_NAME: QwenVoice.app
        MARKETING_VERSION: "1.2.3"
        CURRENT_PROJECT_VERSION: "15"
        SWIFT_VERSION: "6"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LIQUID
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/QwenVoice.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: GRDB
    postBuildScripts:
      - name: Sanitize Bundled Backend Resources
        shell: /bin/bash
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RESOURCES_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          BACKEND_DIR="${RESOURCES_DIR}/backend"

          rm -f \
            "${RESOURCES_DIR}/server.py" \
            "${RESOURCES_DIR}/mlx_audio_qwen_speed_patch.py" \
            "${RESOURCES_DIR}/server_compat.py"

          if [ -d "${BACKEND_DIR}" ]; then
            rm -f "${BACKEND_DIR}/server_compat.py"
            find "${BACKEND_DIR}" -type d -name "__pycache__" -prune -exec rm -rf {} +
            find "${BACKEND_DIR}" -name "*.pyc" -delete
          fi

  QwenVoiceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QwenVoiceTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.tests
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: QwenVoice

  QwenVoiceUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: QwenVoiceUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.uitests
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: QwenVoice
    dependencies:
      - target: QwenVoice
