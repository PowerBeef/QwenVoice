# QwenVoice Workflow Operating Guide Replacement Update

## Action

Follow the operating-guide-replacement-update workflow:
1. Create or expand the new operating guide file (e.g., CLAUDE.md) with updated or merged content.
2. Delete or deprecate the old operating guide file (e.g., AGENTS.md).
3. Update all documentation files that reference the old guide to point to the new guide.
4. Update enforcement scripts (e.g., scripts/check_project_inputs.sh) to allow or disallow references to the new/old guide as appropriate.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: CLAUDE.md, AGENTS.md, docs/README.md

