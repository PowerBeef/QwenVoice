name: Project Inputs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-project-inputs:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app
          xcodebuild -version

      - name: Validate checked-in project inputs
        run: bash ./scripts/check_project_inputs.sh

      - name: Validate contract and backend
        run: python3 scripts/harness.py validate
