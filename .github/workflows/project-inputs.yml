name: Project Inputs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-project-inputs:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST_XCODE="$(python3 -c "from pathlib import Path; apps=sorted(Path('/Applications').glob('Xcode*.app')); print(apps[-1] if apps else Path('/Applications/Xcode.app'))")"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Validate checked-in project inputs
        run: ./scripts/check_project_inputs.sh

      - name: Validate shared repo contracts
        run: python3 scripts/harness.py validate
