name: Backend Freeze Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CI_RESULT_ROOT: build/ci-results

jobs:
  validate-apple-platforms:
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          SELECTED_XCODE="$(python3 -c "from pathlib import Path; apps=sorted(Path('/Applications').glob('Xcode*.app')); preferred=Path('/Applications/Xcode.app'); stable=[app for app in apps if 'beta' not in app.name.lower()]; print(preferred if preferred.exists() else (stable[-1] if stable else (apps[-1] if apps else preferred)))")"
          sudo xcode-select -s "$SELECTED_XCODE"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            build/harness/source-packages
            build/foundation/source-packages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Prepare CI result roots
        run: |
          rm -rf "$CI_RESULT_ROOT"
          mkdir -p "$CI_RESULT_ROOT"

      - name: Validate checked-in project inputs
        run: ./scripts/check_project_inputs.sh

      - name: Harness validate
        run: python3 scripts/harness.py validate

      - name: Swift tests
        run: python3 scripts/harness.py test --layer swift

      - name: Contract tests
        run: python3 scripts/harness.py test --layer contract

      - name: Native tests
        run: python3 scripts/harness.py test --layer native

      - name: End-to-end UI smoke (macOS)
        # The e2e layer drives Vocello.app via XCUITest under the stub
        # backend to prove the live-preview pipeline reaches the user UI
        # (Custom Voice → Generate → live badge → no decode error). If the
        # hosted runner's Accessibility permission or window activation
        # blocks test-runner automation, the layer self-demotes to a skip
        # with a clear diagnostic so the workflow doesn't block on a
        # system-permission bootstrap. The programmatic integration tests
        # under the `swift` layer (LivePreviewIntegrationTests) cover the
        # same pipeline without requiring XCUITest, so core coverage is
        # preserved regardless.
        run: python3 scripts/harness.py test --layer e2e

      - name: Build macOS app
        run: |
          xcodebuild \
            -project QwenVoice.xcodeproj \
            -scheme QwenVoice \
            -destination 'platform=macOS' \
            -resultBundlePath "$CI_RESULT_ROOT/qwenvoice-macos-build.xcresult" \
            -resultBundleVersion 3 \
            build

      - name: Build iPhone app and extension
        run: |
          xcodebuild \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -destination 'generic/platform=iOS' \
            -resultBundlePath "$CI_RESULT_ROOT/vocello-ios-generic-build.xcresult" \
            -resultBundleVersion 3 \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Build and verify unsigned macOS release artifact
        run: |
          ./scripts/release.sh --output-name Vocello-macos26-ci
          ./scripts/verify_packaged_dmg.sh build/Vocello-macos26-ci.dmg build/release-metadata.txt

      - name: Publish backend-freeze gate summary
        if: always()
        run: |
          {
            echo "## Backend Freeze Gate"
            echo
            echo "- This workflow is the shared-core regression gate for the macOS-first release track."
            echo "- Project inputs, harness validation, shared Swift/runtime lanes, generic macOS/iPhone compile proof, and the macOS end-to-end UI smoke (\`harness test --layer e2e\`) ran here."
            echo "- Unsigned macOS release verification remains part of the blocking gate."
            echo "- iPhone foundation tests and TestFlight release proof remain maintained, but they are deferred from the current public release milestone."
            echo "- Signed public release proof is owned by the dedicated Vocello macOS Release workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload foundation xcresult bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-freeze-gate-xcresults
          if-no-files-found: warn
          path: |
            build/harness/results
            build/ci-results
            build/foundation/*.xcresult

      - name: Upload release verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-freeze-gate-release-proof
          if-no-files-found: warn
          path: |
            build/release-metadata.txt
            build/release-build-settings.log
            build/xcodebuild-release.log
