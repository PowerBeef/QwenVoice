name: Release Dual UI

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or commit to build"
        required: false
        default: "main"
        type: string
      artifact_label:
        description: "Optional artifact suffix (appended to uploaded artifact names)"
        required: false
        default: ""
        type: string
      release_tag:
        description: "Optional release tag (e.g. v1.1.6). If provided, both variants are uploaded to this release."
        required: false
        default: ""
        type: string
      release_notes_path:
        description: "Optional checked-in release notes file to publish with the release tag."
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: release-dual-ui-${{ github.workflow }}-${{ inputs.release_tag || inputs.git_ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build ${{ matrix.variant.id }} (${{ matrix.variant.runner }})
    runs-on: ${{ matrix.variant.runner }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        variant:
          - id: modern-liquid
            runner: macos-26
            ui_profile: liquid
            output_name: QwenVoice-macos26
          - id: legacy-glass
            runner: macos-15
            ui_profile: legacy
            output_name: QwenVoice-macos15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Select Xcode
        run: |
          case "${{ matrix.variant.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac

      - name: Print build context
        run: |
          echo "variant: ${{ matrix.variant.id }}"
          echo "runner: ${{ matrix.variant.runner }}"
          echo "ui_profile: ${{ matrix.variant.ui_profile }}"
          echo "output_name: ${{ matrix.variant.output_name }}"
          echo "git_ref input: ${{ inputs.git_ref }}"
          echo "resolved SHA: $GITHUB_SHA"
          echo "run ID: $GITHUB_RUN_ID"
          echo "run number: $GITHUB_RUN_NUMBER"
          sw_vers
          xcodebuild -version

      - name: Ensure XcodeGen is installed
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            echo "xcodegen already installed: $(xcodegen --version)"
          else
            brew install xcodegen
            echo "xcodegen installed: $(xcodegen --version)"
          fi

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Assert release signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEV_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          APPLE_DEV_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          MISSING=0
          for secret_name in \
            APPLE_TEAM_ID \
            APPLE_DEV_ID_APP_P12_BASE64 \
            APPLE_DEV_ID_APP_P12_PASSWORD \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_PRIVATE_KEY_P8; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is required for signed/notarized releases"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Developer ID signing materials
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEV_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          APPLE_DEV_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          SIGNING_KEYCHAIN_PATH="$RUNNER_TEMP/qwenvoice-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/qwenvoice-dev-id-app.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(python3 -c 'import secrets; print(secrets.token_urlsafe(24))')"

          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "::add-mask::$APPLE_DEV_ID_APP_P12_PASSWORD"

          APPLE_DEV_ID_APP_P12_BASE64="$APPLE_DEV_ID_APP_P12_BASE64" \
          CERT_PATH="$CERT_PATH" \
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_DEV_ID_APP_P12_BASE64"]))'

          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY_P8" > "$NOTARY_KEY_PATH"
          chmod 600 "$CERT_PATH" "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$SIGNING_KEYCHAIN_PATH" \
            -P "$APPLE_DEV_ID_APP_P12_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN_PATH"
          security default-keychain -d user -s "$SIGNING_KEYCHAIN_PATH"

          CODESIGN_IDENTITY="$(security find-identity -v -p codesigning "$SIGNING_KEYCHAIN_PATH" | awk -F'\"' '/Developer ID Application:/ { print $2; exit }')"
          if [ -z "$CODESIGN_IDENTITY" ]; then
            echo "::error::Could not find a Developer ID Application identity in the imported certificate"
            exit 1
          fi

          {
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            echo "APPLE_CODESIGN_IDENTITY=$CODESIGN_IDENTITY"
            echo "QWENVOICE_SIGNING_KEYCHAIN=$SIGNING_KEYCHAIN_PATH"
            echo "APPLE_DEV_ID_APP_P12_PATH=$CERT_PATH"
            echo "APPLE_NOTARY_KEY_ID=$APPLE_NOTARY_KEY_ID"
            echo "APPLE_NOTARY_ISSUER_ID=$APPLE_NOTARY_ISSUER_ID"
            echo "APPLE_NOTARY_API_KEY_PATH=$NOTARY_KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Build release pipeline
        env:
          APPLE_CODESIGN_IDENTITY: ${{ env.APPLE_CODESIGN_IDENTITY }}
          QWENVOICE_SIGNING_KEYCHAIN: ${{ env.QWENVOICE_SIGNING_KEYCHAIN }}
        run: |
          ./scripts/release.sh \
            --ui-profile "${{ matrix.variant.ui_profile }}" \
            --output-name "${{ matrix.variant.output_name }}" \
            --signing-mode developer-id \
            --signing-identity "$APPLE_CODESIGN_IDENTITY" \
            --codesign-keychain "$QWENVOICE_SIGNING_KEYCHAIN"

      - name: Verify signed app bundle and isolated startup in final app
        run: |
          APP_PATH="build/QwenVoice.app"
          RESOURCES_PATH="$APP_PATH/Contents/Resources"

          test -d "$APP_PATH"
          test -d "$RESOURCES_PATH"
          test -x "$RESOURCES_PATH/ffmpeg"
          test -d "$RESOURCES_PATH/python"
          test -f "$RESOURCES_PATH/python/.qwenvoice-runtime-manifest.json"
          test -x "$RESOURCES_PATH/python/bin/python3" || test -x "$RESOURCES_PATH/python/bin/python3.13"
          test -f "$RESOURCES_PATH/server.py" || test -f "$RESOURCES_PATH/backend/server.py"

          if find "$RESOURCES_PATH" -name "*.whl" -print -quit | grep -q .; then
            echo "Error: .whl files leaked into app resources"
            exit 1
          fi
          if find "$RESOURCES_PATH" \( -name "*.pyc" -o -type d -name "__pycache__" \) -print -quit | grep -q .; then
            echo "Error: compiled Python artifacts leaked into app resources"
            exit 1
          fi

          codesign --verify --deep --strict "$APP_PATH"
          QWENVOICE_EXPECT_SIGNED_RELEASE=1 ./scripts/verify_release_bundle.sh "$APP_PATH"

      - name: Assert outputs and capture metadata
        run: |
          APP_PATH="build/QwenVoice.app"
          APP_BINARY="$APP_PATH/Contents/MacOS/QwenVoice"
          DMG_PATH="build/${{ matrix.variant.output_name }}.dmg"
          DMG_BASENAME="$(basename "$DMG_PATH")"
          METADATA_PATH="build/release-metadata-${{ matrix.variant.id }}.txt"
          EXPECTED_DMG_NAME="${{ matrix.variant.output_name }}.dmg"
          EXPECTED_UI_PROFILE="${{ matrix.variant.ui_profile }}"
          EXPECTED_MLX_WHEEL_TAG="cp313-cp313-macosx_15_0_arm64"
          EXPECTED_MLX_METAL_WHEEL_TAG="py3-none-macosx_15_0_arm64"
          EXPECTED_MLX_CORE_MINOS="15.0"
          MLX_METALLIB_PATH="$(find "$APP_PATH/Contents/Resources/python/lib" -path '*/site-packages/mlx/lib/mlx.metallib' -type f | head -n1)"

          test -d "$APP_PATH"
          test -f "$DMG_PATH"
          test -f "build/release-metadata.txt"

          APP_MINOS="$(otool -l "$APP_BINARY" | awk '$1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_block = 1; next } in_block && $1 == "minos" { print $2; exit }')"
          APP_SDK="$(otool -l "$APP_BINARY" | awk '$1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_block = 1; next } in_block && $1 == "sdk" { print $2; exit }')"
          APP_SDK_MAJOR="$(printf '%s' "$APP_SDK" | cut -d. -f1)"

          META_UI_PROFILE="$(grep -E '^ui_profile=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_DMG_NAME="$(grep -E '^dmg_name=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_VERSION="$(grep -E '^mlx_version=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_METAL_VERSION="$(grep -E '^mlx_metal_version=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_LM_VERSION="$(grep -E '^mlx_lm_version=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_AUDIO_VERSION="$(grep -E '^mlx_audio_version=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_TRANSFORMERS_VERSION="$(grep -E '^transformers_version=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_WHEEL_TAG="$(grep -E '^mlx_wheel_tag=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_METAL_WHEEL_TAG="$(grep -E '^mlx_metal_wheel_tag=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"
          META_MLX_CORE_MINOS="$(grep -E '^mlx_core_minos=' build/release-metadata.txt | head -n1 | cut -d= -f2-)"

          if [ "$APP_MINOS" != "15.0" ]; then
            echo "Error: app minOS is $APP_MINOS (expected 15.0)"
            exit 1
          fi

          if [ "$META_UI_PROFILE" != "$EXPECTED_UI_PROFILE" ]; then
            echo "Error: metadata ui_profile is '$META_UI_PROFILE' (expected '$EXPECTED_UI_PROFILE')"
            exit 1
          fi
          if [ "$META_DMG_NAME" != "$EXPECTED_DMG_NAME" ]; then
            echo "Error: metadata dmg_name is '$META_DMG_NAME' (expected '$EXPECTED_DMG_NAME')"
            exit 1
          fi
          for value_name in \
            META_MLX_VERSION \
            META_MLX_METAL_VERSION \
            META_MLX_LM_VERSION \
            META_MLX_AUDIO_VERSION \
            META_TRANSFORMERS_VERSION \
            META_MLX_WHEEL_TAG \
            META_MLX_METAL_WHEEL_TAG \
            META_MLX_CORE_MINOS; do
            if [ -z "${!value_name}" ]; then
              echo "Error: release metadata is missing $value_name"
              exit 1
            fi
          done

          if ! printf '%s' "$APP_SDK_MAJOR" | grep -Eq '^[0-9]+$'; then
            echo "Error: could not parse SDK major from '$APP_SDK'"
            exit 1
          fi

          case "${{ matrix.variant.id }}" in
            legacy-glass)
              if [ -z "$MLX_METALLIB_PATH" ]; then
                echo "Error: legacy-glass build is missing mlx.metallib in the packaged runtime"
                exit 1
              fi
              if [ "$APP_SDK_MAJOR" -ne 15 ]; then
                echo "Error: legacy-glass SDK major is $APP_SDK_MAJOR (expected 15.x)"
                exit 1
              fi
              if [ "$META_MLX_WHEEL_TAG" != "$EXPECTED_MLX_WHEEL_TAG" ]; then
                echo "Error: legacy-glass mlx_wheel_tag is '$META_MLX_WHEEL_TAG' (expected '$EXPECTED_MLX_WHEEL_TAG')"
                exit 1
              fi
              if [ "$META_MLX_METAL_WHEEL_TAG" != "$EXPECTED_MLX_METAL_WHEEL_TAG" ]; then
                echo "Error: legacy-glass mlx_metal_wheel_tag is '$META_MLX_METAL_WHEEL_TAG' (expected '$EXPECTED_MLX_METAL_WHEEL_TAG')"
                exit 1
              fi
              if [ "$META_MLX_CORE_MINOS" != "$EXPECTED_MLX_CORE_MINOS" ]; then
                echo "Error: legacy-glass mlx_core_minos is '$META_MLX_CORE_MINOS' (expected '$EXPECTED_MLX_CORE_MINOS')"
                exit 1
              fi
              ;;
            modern-liquid)
              if [ "$APP_SDK_MAJOR" -lt 26 ]; then
                echo "Error: modern-liquid SDK major is $APP_SDK_MAJOR (expected >= 26)"
                exit 1
              fi
              ;;
            *)
              echo "Error: unknown matrix variant id '${{ matrix.variant.id }}'"
              exit 1
              ;;
          esac

          cp "build/release-metadata.txt" "$METADATA_PATH"
          {
            echo "git_ref_input=${{ inputs.git_ref }}"
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "variant_id=${{ matrix.variant.id }}"
            echo "variant_runner=${{ matrix.variant.runner }}"
            echo "app_sdk=$APP_SDK"
            echo "app_sdk_major=$APP_SDK_MAJOR"
            echo "app_minos_asserted=$APP_MINOS"
          } >> "$METADATA_PATH"

      - name: Verify mounted packaged DMG before notarization
        run: |
          QWENVOICE_EXPECT_SIGNED_RELEASE=1 \
          ./scripts/verify_packaged_dmg.sh \
            "build/${{ matrix.variant.output_name }}.dmg" \
            "build/release-metadata-${{ matrix.variant.id }}.txt"

      - name: Compute build artifact name
        run: |
          name="qwenvoice-dual-ui-build-${GITHUB_RUN_NUMBER}-${{ matrix.variant.id }}"
          label="${{ inputs.artifact_label }}"
          if [ -n "$label" ]; then
            safe_label="$(printf '%s' "$label" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-*//; s/-*$//')"
            if [ -n "$safe_label" ]; then
              name="${name}-${safe_label}"
            fi
          fi
          echo "BUILD_ARTIFACT_NAME=$name" >> "$GITHUB_ENV"
          echo "build artifact name: $name"

      - name: Upload intermediate build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          if-no-files-found: error
          path: |
            build/${{ matrix.variant.output_name }}.dmg
            build/release-metadata-${{ matrix.variant.id }}.txt

      - name: Clean up signing credentials
        if: always()
        run: |
          if [ -n "${QWENVOICE_SIGNING_KEYCHAIN:-}" ] && [ -f "$QWENVOICE_SIGNING_KEYCHAIN" ]; then
            security delete-keychain "$QWENVOICE_SIGNING_KEYCHAIN" >/dev/null 2>&1 || true
          fi
          rm -f "${APPLE_DEV_ID_APP_P12_PATH:-}" "${APPLE_NOTARY_API_KEY_PATH:-}"

  notarize-release:
    name: Notarize and validate dual UI assets
    runs-on: macos-26
    needs: build-release
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 1

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Assert notarization secrets
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          MISSING=0
          for secret_name in \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_PRIVATE_KEY_P8; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is required for notarization"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare notary API key
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY_P8" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          {
            echo "APPLE_NOTARY_KEY_ID=$APPLE_NOTARY_KEY_ID"
            echo "APPLE_NOTARY_ISSUER_ID=$APPLE_NOTARY_ISSUER_ID"
            echo "APPLE_NOTARY_API_KEY_PATH=$NOTARY_KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Download intermediate build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: qwenvoice-dual-ui-build-${{ github.run_number }}-*
          merge-multiple: true

      - name: Show downloaded files
        run: find dist -maxdepth 2 -type f | sort

      - name: Notarize, staple, and verify DMGs
        env:
          APPLE_NOTARY_API_KEY_PATH: ${{ env.APPLE_NOTARY_API_KEY_PATH }}
          APPLE_NOTARY_KEY_ID: ${{ env.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ env.APPLE_NOTARY_ISSUER_ID }}
        run: |
          mkdir -p dist/notary-logs

          NOTARY_BASE_ARGS=(
            --key "$APPLE_NOTARY_API_KEY_PATH"
            --key-id "$APPLE_NOTARY_KEY_ID"
          )
          if [ -n "$APPLE_NOTARY_ISSUER_ID" ]; then
            NOTARY_BASE_ARGS+=(--issuer "$APPLE_NOTARY_ISSUER_ID")
          fi

          notarize_one() {
            local variant_id="$1"
            local dmg_basename="$2"
            local dmg_path="dist/$dmg_basename"
            local metadata_path="dist/release-metadata-${variant_id}.txt"
            local submit_json_path="dist/notary-logs/notary-submit-${variant_id}.json"
            local log_json_path="dist/notary-logs/notary-log-${variant_id}.json"
            local verify_dir

            test -f "$dmg_path"
            test -f "$metadata_path"

            local -a submit_args=("${NOTARY_BASE_ARGS[@]}" --wait --timeout 20m --output-format json)

            local submit_json
            submit_json="$(xcrun notarytool submit "$dmg_path" "${submit_args[@]}")"
            printf '%s\n' "$submit_json" | tee "$submit_json_path"

            local submission_id
            submission_id="$(printf '%s\n' "$submit_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
            local status
            status="$(printf '%s\n' "$submit_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')"

            if [ "$status" != "Accepted" ]; then
              xcrun notarytool log "$submission_id" "${NOTARY_BASE_ARGS[@]}" --output-format json | tee "$log_json_path"
              echo "::error::Notarization failed for $dmg_basename with status '$status'"
              exit 1
            fi

            xcrun stapler staple "$dmg_path"
            xcrun stapler validate "$dmg_path"
            spctl -a -vvv --type open --context context:primary-signature "$dmg_path"

            local dmg_sha256_path="${dmg_path}.sha256"
            local dmg_sha256
            dmg_sha256="$(shasum -a 256 "$dmg_path" | awk '{print $1}')"
            printf '%s  %s\n' "$dmg_sha256" "$dmg_basename" > "$dmg_sha256_path"

            verify_dir="$(mktemp -d)"
            cp "$dmg_path" "$verify_dir/$dmg_basename"
            cp "$dmg_sha256_path" "$verify_dir/${dmg_basename}.sha256"
            (
              cd "$verify_dir"
              shasum -a 256 -c "${dmg_basename}.sha256"
            )
            rm -rf "$verify_dir"

            QWENVOICE_EXPECT_SIGNED_RELEASE=1 \
            QWENVOICE_EXPECT_NOTARIZED_DMG=1 \
            ./scripts/verify_packaged_dmg.sh "$dmg_path" "$metadata_path"

            printf '%s\t%s\n' "$variant_id" "$dmg_basename" >> dist/notary-logs/status.tsv
          }

          notarize_one modern-liquid QwenVoice-macos26.dmg
          notarize_one legacy-glass QwenVoice-macos15.dmg

      - name: Compute final artifact name
        run: |
          name="qwenvoice-dual-ui-${GITHUB_RUN_NUMBER}-final"
          label="${{ inputs.artifact_label }}"
          if [ -n "$label" ]; then
            safe_label="$(printf '%s' "$label" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-*//; s/-*$//')"
            if [ -n "$safe_label" ]; then
              name="${name}-${safe_label}"
            fi
          fi
          echo "FINAL_ARTIFACT_NAME=$name" >> "$GITHUB_ENV"
          echo "NOTARY_LOGS_ARTIFACT_NAME=${name}-notary-logs" >> "$GITHUB_ENV"
          echo "final artifact name: $name"

      - name: Write notarization summary
        run: |
          TARGET_SHA="$(grep -h '^commit_sha=' dist/release-metadata-*.txt | cut -d= -f2- | sort -u)"
          if [ -z "$TARGET_SHA" ]; then
            echo "::error::Could not determine target SHA from release metadata"
            exit 1
          fi

          {
            echo "## Final Release Receipt"
            echo ""
            echo "- Target SHA: \`$TARGET_SHA\`"
            echo "- Final artifact bundle: \`${FINAL_ARTIFACT_NAME}\`"
            echo ""
            echo "| Variant | DMG | UI profile | SDK | Notarization | Stapled |"
            echo "| --- | --- | --- | --- | --- | --- |"
            while IFS=$'\t' read -r variant_id dmg_basename; do
              case "$variant_id" in
                modern-liquid) metadata_path="dist/release-metadata-modern-liquid.txt" ;;
                legacy-glass) metadata_path="dist/release-metadata-legacy-glass.txt" ;;
                *)
                  echo "::error::Unknown variant id in notarization status: $variant_id"
                  exit 1
                  ;;
              esac

              ui_profile="$(grep -E '^ui_profile=' "$metadata_path" | head -n1 | cut -d= -f2-)"
              app_sdk="$(grep -E '^app_sdk=' "$metadata_path" | head -n1 | cut -d= -f2-)"
              echo "| $variant_id | \`$dmg_basename\` | $ui_profile | $app_sdk | Accepted | Yes |"
            done < dist/notary-logs/status.tsv
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload final notarized artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.FINAL_ARTIFACT_NAME }}
          if-no-files-found: error
          path: |
            dist/QwenVoice-macos26.dmg
            dist/QwenVoice-macos26.dmg.sha256
            dist/release-metadata-modern-liquid.txt
            dist/QwenVoice-macos15.dmg
            dist/QwenVoice-macos15.dmg.sha256
            dist/release-metadata-legacy-glass.txt

      - name: Upload notary logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.NOTARY_LOGS_ARTIFACT_NAME }}
          if-no-files-found: warn
          path: |
            dist/notary-logs/*.json
            dist/notary-logs/status.tsv

      - name: Clean up notary API key
        if: always()
        run: rm -f "${APPLE_NOTARY_API_KEY_PATH:-}"

  publish-release:
    name: Publish dual UI assets to release
    runs-on: ubuntu-latest
    needs: notarize-release
    if: ${{ inputs.release_tag != '' }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 1

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: qwenvoice-dual-ui-${{ github.run_number }}-final*
          merge-multiple: true

      - name: Show artifact files
        run: find dist -maxdepth 2 -type f | sort

      - name: Validate final release metadata
        run: |
          MODERN_METADATA="dist/release-metadata-modern-liquid.txt"
          LEGACY_METADATA="dist/release-metadata-legacy-glass.txt"

          test -f "$MODERN_METADATA"
          test -f "$LEGACY_METADATA"

          MODERN_SHA="$(grep -E '^commit_sha=' "$MODERN_METADATA" | head -n1 | cut -d= -f2-)"
          LEGACY_SHA="$(grep -E '^commit_sha=' "$LEGACY_METADATA" | head -n1 | cut -d= -f2-)"
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"

          if [ -z "$MODERN_SHA" ] || [ -z "$LEGACY_SHA" ]; then
            echo "::error::Missing commit_sha in one or both release metadata files"
            exit 1
          fi
          if [ "$MODERN_SHA" != "$LEGACY_SHA" ]; then
            echo "::error::Release metadata commit_sha mismatch: modern=$MODERN_SHA legacy=$LEGACY_SHA"
            exit 1
          fi
          if [ "$MODERN_SHA" != "$CHECKED_OUT_SHA" ]; then
            echo "::error::Release metadata commit_sha $MODERN_SHA does not match checked out SHA $CHECKED_OUT_SHA"
            exit 1
          fi

          echo "RELEASE_TARGET_SHA=$CHECKED_OUT_SHA" >> "$GITHUB_ENV"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          NOTES_PATH="${{ inputs.release_notes_path }}"
          TITLE="QwenVoice ${TAG#v}"

          if [ -z "$NOTES_PATH" ]; then
            echo "::error::release_notes_path is required when release_tag is set"
            exit 1
          fi
          if [ ! -f "$NOTES_PATH" ]; then
            echo "::error::Release notes file not found: $NOTES_PATH"
            exit 1
          fi

          COMMIT_SHA="${RELEASE_TARGET_SHA:-$GITHUB_SHA}"

          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            gh release edit "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes-file "$NOTES_PATH" \
              --target "$COMMIT_SHA"
            exit 0
          fi

          gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
            --target "$COMMIT_SHA" \
            --title "$TITLE" \
            --notes-file "$NOTES_PATH"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          MODERN_BASE="QwenVoice-macos26"
          LEGACY_BASE="QwenVoice-macos15"

          MISSING=0
          for f in \
            "dist/QwenVoice-macos26.dmg" \
            "dist/QwenVoice-macos26.dmg.sha256" \
            "dist/release-metadata-modern-liquid.txt" \
            "dist/QwenVoice-macos15.dmg" \
            "dist/QwenVoice-macos15.dmg.sha256" \
            "dist/release-metadata-legacy-glass.txt"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required artifact: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING release artifact(s) missing — aborting upload"
            exit 1
          fi

          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" \
            "dist/QwenVoice-macos26.dmg#${MODERN_BASE}.dmg" \
            "dist/QwenVoice-macos26.dmg.sha256#${MODERN_BASE}.dmg.sha256" \
            "dist/release-metadata-modern-liquid.txt#${MODERN_BASE}.metadata.txt" \
            "dist/QwenVoice-macos15.dmg#${LEGACY_BASE}.dmg" \
            "dist/QwenVoice-macos15.dmg.sha256#${LEGACY_BASE}.dmg.sha256" \
            "dist/release-metadata-legacy-glass.txt#${LEGACY_BASE}.metadata.txt" \
            --clobber
