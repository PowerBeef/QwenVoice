name: CI

# Pre-merge CI for Vocello (QwenVoice).
#
# iOS: compile-only on GitHub-hosted runners — `build-for-testing` against the device SDK
# (no Simulator, no XCUITest). Real iOS UI tests run on a paired iPhone via
# `scripts/ios_device.sh gate` locally before merge.
#
# macOS UI smoke is NOT here yet: GitHub runners cannot launch a macOS-26-targeted app
# (same reason release.yml sets QWENVOICE_SKIP_LAUNCH_SMOKE=1). It runs locally via
# `scripts/macos_test.sh test`. The manual `macos_ui_smoke` dispatch input is a placeholder
# for when macOS-26 runner images support it reliably.
#
# Toolchain pinning mirrors release.yml: Xcode 26, XcodeGen + xcbeautify via Homebrew,
# SPM versions inherited from the committed Package.resolved.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      macos_ui_smoke:
        description: 'Also attempt macOS UI smoke (only useful on a macOS-26 runner)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-compile-check:
    name: iOS compile check (device SDK)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: |
          brew install xcodegen xcbeautify
          xcodegen --version
          xcbeautify --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            build/ci/ios-compile-dd/SourcePackages
          key: spm-ios-compile-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-compile-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Build VocelloiOS + VocelloiOSUITests for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ci/ios-compile-dd \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

  macos-ui-smoke:
    name: macOS UI smoke (manual; needs macOS-26 runner)
    # Manual only: macOS-26-targeted app launch may still fail on shared runners
    # (see release.yml QWENVOICE_SKIP_LAUNCH_SMOKE). Fire via workflow_dispatch when testing.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.macos_ui_smoke }}
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Run macOS UI smoke
        run: |
          set -euo pipefail
          xcodebuild test \
            -project QwenVoice.xcodeproj \
            -scheme QwenVoice \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/ci/macos-dd \
            -resultBundlePath build/ci/macos-ui.xcresult | xcbeautify

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-ui-xcresult
          path: build/ci/macos-ui.xcresult
          if-no-files-found: warn
          retention-days: 14
