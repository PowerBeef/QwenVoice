name: CI

# Pre-merge CI for Vocello (QwenVoice).
#
# iOS: compile the app and standalone pure-logic XCTest bundle against the physical-device SDK.
# Neither bundle executes in ordinary CI; XCUITest remains explicit local work.
#
# Ordinary CI remains UI-free: project inputs, macOS Core/XPC/runtime tests, and compile checks.
#
# Toolchain identities are locked in config/toolchain.json. Installed tools are
# accepted only when their observed versions match the relevant manifest group.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap path router: computes which surfaces changed so heavy macos-26 jobs
  # skip for docs-only pushes. The local commit-gate hook still runs the
  # documentation/link contracts on every commit, and any native change
  # re-runs the full suite here. `ci-required` aggregates results (skipped
  # counts as pass) and is the single branch-protection context.
  changes:
    name: Change routing
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      native: ${{ steps.classify.outputs.native }}
      website: ${{ steps.classify.outputs.website }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          native=true
          website=true
          changed=""
          if [[ "$EVENT_NAME" == "pull_request" && -n "$BASE_REF" ]]; then
            git fetch --quiet origin "$BASE_REF"
            changed="$(git diff --name-only "origin/$BASE_REF...HEAD")"
          elif [[ "$EVENT_NAME" == "push" && -n "$BEFORE_SHA"               && "$BEFORE_SHA" != "0000000000000000000000000000000000000000"               && "$(git cat-file -t "$BEFORE_SHA" 2>/dev/null || true)" == "commit" ]]; then
            changed="$(git diff --name-only "$BEFORE_SHA..$HEAD_SHA")"
          fi
          if [[ -n "$changed" ]]; then
            native=false
            website=false
            while IFS= read -r path; do
              case "$path" in
                Sources/*|Tests/*|Packages/*|config/*|scripts/*|benchmarks/*|project.yml|QwenVoice.xcodeproj/*|.github/*|Package.resolved)
                  native=true ;;
              esac
              case "$path" in
                website/*) website=true ;;
              esac
            done <<<"$changed"
          fi
          echo "native=$native" >>"$GITHUB_OUTPUT"
          echo "website=$website" >>"$GITHUB_OUTPUT"
          echo "routing: native=$native website=$website (empty diff ⇒ run everything)"

  ios-compile-check:
    name: iOS compile check (device SDK)
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Project-input validation verifies historical evidence commits.
          fetch-depth: 0

      - name: Select Xcode 26.6
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          xcodebuild -version
          swift --version

      - name: Install deterministic tooling
        run: |
          brew install xcodegen xcbeautify ripgrep shellcheck numpy
          xcodegen --version
          xcbeautify --version
          rg --version
          shellcheck --version
          python3 -c 'import numpy; print(numpy.__version__)'
          python3 scripts/supply_chain_contract.py --installed native

      - name: Cache SwiftPM dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/cache/xcode/source-packages
          key: spm-ios-compile-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-compile-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Resolve SwiftPM dependencies
        run: |
          set -euo pipefail
          python3 scripts/lib/ios_platform_preflight.py check
          mkdir -p build/cache/xcode/source-packages build/scratch/derived-data/ci/ios-compile
          xcodebuild -resolvePackageDependencies \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -derivedDataPath build/scratch/derived-data/ci/ios-compile \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile

      - name: Compile VocelloiOS for the device SDK
        run: |
          set -euo pipefail
          xcodebuild build \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/scratch/derived-data/ci/ios-compile \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Compile iOS logic tests for the device SDK
        run: |
          set -euo pipefail
          xcodebuild build \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOSLogic \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/scratch/derived-data/ci/ios-compile \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

  macos-deterministic-tests:
    name: macOS deterministic tests
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Select Xcode 26.6
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          xcodebuild -version
          swift --version

      - name: Install deterministic tooling
        run: |
          brew install xcodegen xcbeautify ripgrep shellcheck numpy
          xcodegen --version
          xcbeautify --version
          rg --version
          shellcheck --version
          python3 -c 'import numpy; print(numpy.__version__)'
          python3 scripts/supply_chain_contract.py --installed native

      - name: Cache SwiftPM dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/cache/xcode/source-packages
          key: spm-macos-tests-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-macos-tests-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Check project inputs
        run: ./scripts/check_project_inputs.sh

      - name: Run deterministic macOS tests
        run: scripts/macos_test.sh test

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-deterministic-test-artifacts
          path: build/artifacts/macos/tests/
          if-no-files-found: warn
          retention-days: 14

  website-deterministic:
    name: Website deterministic checks
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select pinned Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Select pinned npm
        run: npm install --global npm@11.12.1

      - name: Validate website toolchain
        run: python3 scripts/supply_chain_contract.py --installed website

      - name: Install locked dependencies
        run: npm --prefix website ci

      - name: Lint, test, and build website
        run: npm --prefix website run check

  ci-required:
    name: CI required
    needs: [changes, ios-compile-check, macos-deterministic-tests, website-deterministic]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate required results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$RESULTS"
          if printf '%s' "$RESULTS" | grep -Eq '"result": *"(failure|cancelled)"'; then
            echo "::error::a required CI job failed or was cancelled"
            exit 1
          fi
          echo "all required jobs succeeded or were skipped by path routing"
