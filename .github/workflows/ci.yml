name: CI

# Pre-merge CI for Vocello (QwenVoice).
#
# iOS: compile-only on GitHub-hosted runners — `build-for-testing` against the device SDK
# (no Simulator, no XCUITest). Real iOS UI tests run on a paired iPhone via
# `scripts/ios_device.sh gate` locally before merge.
#
# macOS CI runs deterministic Core/XPC/runtime/harness tests and validates any impact-required
# Computer Use attestation. It never claims to drive frontend UI; that report is produced locally
# by the repository Codex skill against the exact build/Vocello.app.
#
# Toolchain pinning mirrors release.yml: Xcode 26, XcodeGen + xcbeautify via Homebrew,
# SPM versions inherited from the committed Package.resolved.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-compile-check:
    name: iOS compile check (device SDK)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: |
          brew install xcodegen xcbeautify
          xcodegen --version
          xcbeautify --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            build/ci/ios-compile-dd/SourcePackages
          key: spm-ios-compile-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-compile-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Build VocelloiOS + VocelloiOSUITests for testing
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ci/ios-compile-dd \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

  macos-deterministic-tests:
    name: macOS deterministic tests + UI attestation validation
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Run deterministic macOS tests
        run: scripts/macos_test.sh test

      - name: Build exact-path app for attestation fingerprinting
        run: ./scripts/build.sh build

      - name: Validate impact-selected Computer Use attestation
        env:
          QVOICE_BASE_REF: ${{ github.event.pull_request.base.sha || 'HEAD^' }}
        run: scripts/macos_agent_ui.sh impact --check

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-deterministic-test-artifacts
          path: build/macos/test-artifacts/
          if-no-files-found: warn
          retention-days: 14
