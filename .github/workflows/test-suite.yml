name: Test Suite

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit & Contract Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      QWENVOICE_XCODEBUILD_TIMEOUT_SECONDS: ${{ matrix.runner == 'macos-15' && '900' || '300' }}
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          case "${{ matrix.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Set up Python test environment
        run: |
          python3 -m venv .ci-python
          . .ci-python/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pillow
          echo "$PWD/.ci-python/bin" >> "$GITHUB_PATH"

      - name: Set UI profile for runner
        run: |
          ./scripts/set_ci_ui_profile.sh "${{ matrix.runner }}"

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Validate
        run: python3 scripts/harness.py validate

      - name: Swift unit tests
        run: python3 scripts/harness.py test --layer swift

      - name: Contract tests
        run: python3 scripts/harness.py test --layer contract

      - name: Pipeline tests
        run: python3 scripts/harness.py test --layer pipeline

      - name: Server tests
        run: python3 scripts/harness.py test --layer server

      - name: Verify strict concurrency
        run: |
          xcodebuild -project QwenVoice.xcodeproj -scheme QwenVoice build \
            OTHER_SWIFT_FLAGS='-strict-concurrency=complete' 2>&1 \
            | tee /tmp/concurrency-check.log
          WARNINGS=$(grep -c 'warning:.*concurren\|warning:.*[Ss]endable\|warning:.*actor\|warning:.*isolation' /tmp/concurrency-check.log || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::$WARNINGS strict concurrency warnings found"
            grep 'warning:.*concurren\|warning:.*[Ss]endable\|warning:.*actor\|warning:.*isolation' /tmp/concurrency-check.log
            exit 1
          fi
          echo "No strict concurrency warnings."

      - name: Verify alternate UI profile compiles
        run: |
          case "${{ matrix.runner }}" in
            macos-15)
              echo "Skipping — QW_UI_LIQUID requires macOS 26 SDK (Xcode 26+)"
              ;;
            macos-26)
              echo "Building with the legacy project profile..."
              PROJECT_YML_BACKUP="$(mktemp)"
              cp project.yml "$PROJECT_YML_BACKUP"
              cleanup() {
                cp "$PROJECT_YML_BACKUP" project.yml
                rm -f "$PROJECT_YML_BACKUP"
                ./scripts/regenerate_project.sh
              }
              trap cleanup EXIT
              ./scripts/set_ci_ui_profile.sh macos-15
              ./scripts/regenerate_project.sh
              set -o pipefail
              xcodebuild -project QwenVoice.xcodeproj -scheme QwenVoice build 2>&1 | tail -5
              ;;
          esac

  packaged-builds:
    name: Packaged Builds (${{ matrix.variant.id }})
    runs-on: ${{ matrix.variant.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        variant:
          - id: legacy-glass
            runner: macos-15
            ui_profile: legacy
            output_name: QwenVoice-macos15
          - id: modern-liquid
            runner: macos-26
            ui_profile: liquid
            output_name: QwenVoice-macos26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          case "${{ matrix.variant.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Build packaged app
        run: |
          ./scripts/release.sh \
            --ui-profile "${{ matrix.variant.ui_profile }}" \
            --output-name "${{ matrix.variant.output_name }}"

      - name: Verify packaged DMG
        run: |
          ./scripts/verify_packaged_dmg.sh \
            "build/${{ matrix.variant.output_name }}.dmg" \
            "build/release-metadata.txt"

      - name: Upload packaged artifacts for debugging
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: packaged-build-${{ matrix.variant.id }}
          if-no-files-found: warn
          path: |
            build/*.dmg
            build/release-metadata.txt

  runtime-parity:
    name: Runtime Parity
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Ensure runtime parity inputs exist
        run: |
          test -f Sources/Resources/requirements.txt

      - name: Create clean parity environment
        run: |
          python3 -m venv .runtime-parity
          . .runtime-parity/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r Sources/Resources/requirements.txt

      - name: Validate runtime alignment
        run: |
          .runtime-parity/bin/python scripts/harness.py validate --python "$PWD/.runtime-parity/bin/python"

  ui-tests:
    name: UI Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      QWENVOICE_XCODEBUILD_TIMEOUT_SECONDS: ${{ matrix.runner == 'macos-15' && '900' || '300' }}
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          case "${{ matrix.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Set up Python test environment
        run: |
          python3 -m venv .ci-python
          . .ci-python/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pillow
          echo "$PWD/.ci-python/bin" >> "$GITHUB_PATH"

      - name: Set UI profile for runner
        run: |
          ./scripts/set_ci_ui_profile.sh "${{ matrix.runner }}"

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Run UI smoke tests
        run: python3 scripts/harness.py test --layer ui --ui-backend-mode stub --ui-data-root fixture

      - name: Run screenshot capture smoke
        if: always() && matrix.runner == 'macos-26'
        env:
          QWENVOICE_UI_DESIGN_CAPTURE_ONLY: "1"
        run: python3 scripts/harness.py test --layer design --ui-backend-mode stub --ui-data-root fixture

      - name: Upload screenshots
        if: always() && matrix.runner == 'macos-26'
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-${{ matrix.runner }}
          path: |
            build/test/screenshots/
            tests/screenshots/diffs/
          if-no-files-found: warn

  perf-audit:
    name: Performance Audit (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      QWENVOICE_XCODEBUILD_TIMEOUT_SECONDS: ${{ matrix.runner == 'macos-15' && '900' || '300' }}
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          case "${{ matrix.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Set up Python test environment
        run: |
          python3 -m venv .ci-python
          . .ci-python/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pillow
          echo "$PWD/.ci-python/bin" >> "$GITHUB_PATH"

      - name: Set UI profile for runner
        run: |
          ./scripts/set_ci_ui_profile.sh "${{ matrix.runner }}"

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Run performance audit
        run: python3 scripts/harness.py test --layer perf --ui-backend-mode stub --ui-data-root fixture
