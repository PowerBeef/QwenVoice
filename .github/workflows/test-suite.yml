name: Test Suite

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit & Contract Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          case "${{ matrix.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Set up Python test environment
        run: |
          python3 -m venv .ci-python
          . .ci-python/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pillow
          echo "$PWD/.ci-python/bin" >> "$GITHUB_PATH"

      - name: Set UI profile for runner
        run: |
          case "${{ matrix.runner }}" in
            macos-15)
              echo "Patching project.yml to use QW_UI_LEGACY_GLASS for macOS 15 SDK..."
              sed -i '' 's/SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LIQUID/SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LEGACY_GLASS/' project.yml
              ;;
            macos-26)
              echo "Using default QW_UI_LIQUID for macOS 26 SDK"
              ;;
          esac

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Validate
        run: python3 scripts/harness.py validate

      - name: Swift unit tests
        run: python3 scripts/harness.py test --layer swift

      - name: Contract tests
        run: python3 scripts/harness.py test --layer contract

      - name: Pipeline tests
        run: python3 scripts/harness.py test --layer pipeline

      - name: Server tests
        run: python3 scripts/harness.py test --layer server

      - name: Verify strict concurrency
        run: |
          xcodebuild -project QwenVoice.xcodeproj -scheme QwenVoice build \
            OTHER_SWIFT_FLAGS='-strict-concurrency=complete' 2>&1 \
            | tee /tmp/concurrency-check.log
          WARNINGS=$(grep -c 'warning:.*concurren\|warning:.*[Ss]endable\|warning:.*actor\|warning:.*isolation' /tmp/concurrency-check.log || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::$WARNINGS strict concurrency warnings found"
            grep 'warning:.*concurren\|warning:.*[Ss]endable\|warning:.*actor\|warning:.*isolation' /tmp/concurrency-check.log
            exit 1
          fi
          echo "No strict concurrency warnings."

      - name: Verify alternate UI profile compiles
        run: |
          case "${{ matrix.runner }}" in
            macos-15)
              echo "Skipping — QW_UI_LIQUID requires macOS 26 SDK (Xcode 26+)"
              ;;
            macos-26)
              echo "Building with QW_UI_LEGACY_GLASS flag..."
              xcodebuild -project QwenVoice.xcodeproj -scheme QwenVoice build \
                SWIFT_ACTIVE_COMPILATION_CONDITIONS='QW_UI_LEGACY_GLASS' 2>&1 | tail -5
              ;;
          esac

  ui-tests:
    name: UI Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          case "${{ matrix.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Set up Python test environment
        run: |
          python3 -m venv .ci-python
          . .ci-python/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pillow
          echo "$PWD/.ci-python/bin" >> "$GITHUB_PATH"

      - name: Set UI profile for runner
        run: |
          case "${{ matrix.runner }}" in
            macos-15)
              sed -i '' 's/SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LIQUID/SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LEGACY_GLASS/' project.yml
              ;;
          esac

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Run UI smoke tests
        run: python3 scripts/harness.py test --layer ui --ui-backend-mode stub --ui-data-root fixture

      - name: Run screenshot regression tests
        if: always() && matrix.runner == 'macos-26'
        run: python3 scripts/harness.py test --layer design --ui-backend-mode stub --ui-data-root fixture

      - name: Upload screenshots
        if: always() && matrix.runner == 'macos-26'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.runner }}
          path: |
            build/test/screenshots/
            tests/screenshots/diffs/
          if-no-files-found: warn

  perf-audit:
    name: Performance Audit (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          case "${{ matrix.runner }}" in
            macos-15) sudo xcode-select -s /Applications/Xcode_16.3.app ;;
            macos-26) sudo xcode-select -s /Applications/Xcode_26.0.app ;;
          esac
          xcodebuild -version

      - name: Ensure XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Set up Python test environment
        run: |
          python3 -m venv .ci-python
          . .ci-python/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy pillow
          echo "$PWD/.ci-python/bin" >> "$GITHUB_PATH"

      - name: Set UI profile for runner
        run: |
          case "${{ matrix.runner }}" in
            macos-15)
              sed -i '' 's/SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LIQUID/SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LEGACY_GLASS/' project.yml
              ;;
          esac

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Run performance audit
        run: python3 scripts/harness.py test --layer perf --ui-backend-mode stub --ui-data-root fixture
